name: Release on merge to master

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          major_label="${{ contains(github.event.pull_request.labels.*.name, 'major') }}"
          minor_label="${{ contains(github.event.pull_request.labels.*.name, 'minor') }}"
          fix_label="${{ contains(github.event.pull_request.labels.*.name, 'fix') }}"

          selected_count=0
          [[ "${major_label}" == "true" ]] && selected_count=$((selected_count + 1))
          [[ "${minor_label}" == "true" ]] && selected_count=$((selected_count + 1))
          [[ "${fix_label}" == "true" ]] && selected_count=$((selected_count + 1))

          if [[ "${selected_count}" -gt 1 ]]; then
            echo "Error: multiple version labels found. Use only one of: major, minor, fix."
            exit 1
          fi

          bump_type=""
          if [[ "${major_label}" == "true" ]]; then
            bump_type="major"
          elif [[ "${minor_label}" == "true" ]]; then
            bump_type="minor"
          elif [[ "${fix_label}" == "true" ]]; then
            bump_type="fix"
          fi

          if [[ -z "${bump_type}" ]]; then
            echo "Error: missing version label. Add one label among: major, minor, fix."
            exit 1
          fi

          latest_tag="$(git tag --sort=-v:refname | head -n 1 || true)"

          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          current="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${current}"

          case "${bump_type}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            fix)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "bump_type=${bump_type}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "next_version=${next_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Update README version badge
        shell: bash
        run: |
          set -euo pipefail
          next_version="${{ steps.version.outputs.next_version }}"

          sed -E -i \
            "s/version-[0-9]+\.[0-9]+\.[0-9]+-blue\.svg/version-${next_version}-blue.svg/" \
            readme.md

      - name: Commit README update
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- readme.md; then
            echo "No README changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add readme.md
          git commit -m "chore(release): ${{ steps.version.outputs.bump_type }} bump to ${{ steps.version.outputs.next_tag }}"
          git push origin HEAD:master

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.next_tag }}"

          git tag "${tag}"
          git push origin "${tag}"

      - name: Create release archive
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.next_tag }}"
          archive="librogame-engine-${tag}.zip"

          zip -r "${archive}" index.html js/ styles.css story.json LICENSE
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          set -euo pipefail
          sha256sum "${{ steps.archive.outputs.archive }}" > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: Release ${{ steps.version.outputs.next_tag }}
          generate_release_notes: true
          files: |
            ${{ steps.archive.outputs.archive }}
            SHA256SUMS.txt
